# ==============================================================================
# Amosclaud Test Suite Execution Strategy Profile
# Configured via autonomous agents: Amosclaud-ai & Amosclaud-fixee
# ==============================================================================

[pytest]
# Directs the test engine to scan the specific sub-modules first
testpaths = 
    api-gateway
    api_key_manager
    authentication
    tests

# Flags configuration standards to isolate mock behaviors
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Suppresses deprecated warnings from flooding your workflow log screen
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# Configures execution flags to enforce async loops 
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
