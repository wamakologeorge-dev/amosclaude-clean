# ==============================================================================
# Amosclaud Test Suite Execution Strategy Profile
# Configured via autonomous agents: Amosclaud-ai & Amosclaud-fixee
# ==============================================================================

[pytest]
# Directs the testing engine to scan sub-modules cleanly
testpaths = 
    api-gateway
    api_key_manager
    authentication
    tests

# Flags explicit standard rules to isolate execution states
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Suppresses deprecated warnings from flooding the workflow runner environment
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::PendingDeprecationWarning

# Configures asynchronous task management loops
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
