version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: amoscloud_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - amoscloud_network

  amoscloud_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amoscloud_api
    environment:
      DATABASE_URL: sqlite:///./data/amoscloud.db
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    ports:
      - "8000:8000"
    volumes:
      - amoscloud_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - amoscloud_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: amoscloud_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - amoscloud_api
    networks:
      - amoscloud_network
    restart: unless-stopped

volumes:
  amoscloud_data:

networks:
  amoscloud_network:
    driver: bridge
