name: Real Operations Audit

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test runner
        run: python -m pip install --disable-pip-version-check pytest

      - name: Run focused audit tests
        run: python -m pytest -q tests/test_real_operations_audit.py

      - name: Scan production folders
        run: python scripts/audit_real_operations.py --output real-operations-report.json

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-operations-audit
          path: real-operations-report.json
          if-no-files-found: warn
