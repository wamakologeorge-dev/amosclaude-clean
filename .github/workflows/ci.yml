name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q amoscloud_ai src tests

      - name: Lint critical errors
        run: flake8 amoscloud_ai src tests --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        run: pytest -q

      - name: Import application
        run: python -c "from amoscloud_ai.main import app; print(app.title)"

      - name: Build Docker image
        run: docker build -t amosclaud-clean:ci .
