name: Amosclaud CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for the AI to push code back to the repo
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Tests
        run: |
          pytest

      # This step allows the AI to commit changes (e.g., self-refactoring) back to the repo
      - name: Auto-Commit Changes
        run: |
          git config --global user.name 'Amosclaud-AI-Agent'
          git config --global user.email 'agent@amosclaud.com'
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: AI autonomous refactoring and update [skip ci]" && git push)
