name: Amosclaud Bot

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_run:
    workflows: ["CI/CD — Test & Deploy", "Python verification"]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: amosclaud-bot-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  respond:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out trusted repository base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install trusted Amosclaud repository runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run protected privacy preflight
        if: github.event_name == 'issue_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AMOSCLAUD_PRIVATE_REPOSITORY: ${{ vars.AMOSCLAUD_PRIVATE_REPOSITORY }}
          AMOSCLAUD_PRIVATE_TOKEN: ${{ secrets.AMOSCLAUD_PRIVATE_TOKEN }}
          AMOSCLAUD_PRIVACY_ONLY: '1'
        run: python -m amosclaud_bot.dispatcher

      - name: Check out pull request head
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/amosclaud-private-routed ]; then
            echo "Protected/private request stopped before PR-head checkout."
            exit 0
          fi
          gh pr checkout "${{ github.event.issue.number }}"

      - name: Prepare repair branch for issue
        if: >-
          github.event_name == 'issue_comment' &&
          !github.event.issue.pull_request &&
          (startsWith(github.event.comment.body, '@amosclaud fix') || startsWith(github.event.comment.body, '@amosclaud-bot fix')) &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        run: |
          if [ -f /tmp/amosclaud-private-routed ]; then
            echo "Protected/private request does not create a public repair branch."
            exit 0
          fi
          git switch -c "amosclaud-bot/fix-${{ github.event.issue.number }}-${{ github.run_id }}"

      - name: Run Amosclaud Bot dispatcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m amosclaud_bot.dispatcher

      - name: Verify real repair before publishing
        if: >-
          github.event_name == 'issue_comment' &&
          (startsWith(github.event.comment.body, '@amosclaud fix') || startsWith(github.event.comment.body, '@amosclaud-bot fix')) &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -o pipefail

          if [ -f /tmp/amosclaud-private-routed ]; then
            echo "Private work was routed away from this public workflow output."
            exit 0
          fi

          if git diff --quiet && git diff --cached --quiet; then
            gh issue comment "$ISSUE_NUMBER" --body "### Amosclaud Bot — Repair result\n\n**Status:** NO CHANGES PRODUCED\n\nAmosclaud-Fixer did not modify the repository, so no repair is being claimed and no pull request will be created. Review the objective or inspect the failure evidence and try again."
            echo "Amosclaud-Fixer produced no repository changes."
            exit 1
          fi

          git diff --name-only > /tmp/amosclaud-changed-files.txt
          git diff --stat > /tmp/amosclaud-diff-stat.txt

          echo "Running Python compilation verification..."
          python -m compileall -q amosclaud_bot src 2>&1 | tee /tmp/amosclaud-compile.log

          echo "Running Amosclaud bot verification tests..."
          python -m pytest -q \
            tests/test_amosclaud_bot.py \
            tests/test_amosclaud_professional_review.py \
            tests/test_amosclaud_approval_gate.py \
            tests/test_amosclaud_privacy_gate.py \
            2>&1 | tee /tmp/amosclaud-pytest.log

          {
            echo "### Amosclaud Bot — Real repair verification"
            echo
            echo "**Status:** VERIFIED"
            echo
            echo "**Changed files:**"
            sed 's/^/- `/' /tmp/amosclaud-changed-files.txt | sed 's/$/`/'
            echo
            echo "**Diff summary:**"
            echo '```text'
            cat /tmp/amosclaud-diff-stat.txt
            echo '```'
            echo
            echo "**Verification executed:**"
            echo '- `python -m compileall -q amosclaud_bot src`'
            echo '- targeted Amosclaud bot, professional review, approval, and privacy tests'
            echo
            echo "**Pytest result:**"
            echo '```text'
            tail -n 12 /tmp/amosclaud-pytest.log
            echo '```'
            echo
            echo "The repair will only be committed and published because these verification steps passed."
          } > /tmp/amosclaud-real-results.md

          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/amosclaud-real-results.md

      - name: Commit and publish Amosclaud-Fixer changes
        if: >-
          github.event_name == 'issue_comment' &&
          (startsWith(github.event.comment.body, '@amosclaud fix') || startsWith(github.event.comment.body, '@amosclaud-bot fix')) &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/amosclaud-private-routed ]; then
            echo "Private work was routed away from public commit/PR publishing."
            exit 0
          fi

          if git diff --quiet && git diff --cached --quiet; then
            exit 1
          fi

          git config user.name "amosclaud-bot"
          git config user.email "amosclaud-bot@users.noreply.github.com"
          git add -A
          git commit -m "fix: Amosclaud-Fixer repair for #${{ github.event.issue.number }}"
          REPAIR_SHA=$(git rev-parse --short HEAD)

          if [ "${{ github.event.issue.pull_request != null }}" = "true" ]; then
            git push
            gh pr comment "${{ github.event.issue.number }}" --body "### Amosclaud Bot — Repair published\n\n**Commit:** \`${REPAIR_SHA}\`\n\nAmosclaud-Fixer produced repository changes, verification passed, and the verified repair was pushed to this pull request."
          else
            git push -u origin HEAD
            PR_URL=$(gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$(git branch --show-current)" \
              --title "Amosclaud-Fixer: repair issue #${{ github.event.issue.number }}" \
              --body "Automated repair created by Amosclaud Bot through the repository-local Amosclaud Autonomous and Amosclaud-Fixer pipeline. The branch was only published after compilation and targeted bot verification tests passed.\n\nCloses #${{ github.event.issue.number }}")
            gh issue comment "${{ github.event.issue.number }}" --body "### Amosclaud Bot — Repair published\n\n**Commit:** \`${REPAIR_SHA}\`\n**Pull request:** ${PR_URL}\n\nAmosclaud-Fixer produced real repository changes, verification passed, and the verified repair pull request is ready for review."
          fi
