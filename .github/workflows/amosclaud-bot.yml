name: Amosclaud Bot

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: amosclaud-bot-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  respond:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out trusted repository base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install trusted Amosclaud repository runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run protected privacy preflight
        if: github.event_name == 'issue_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AMOSCLAUD_PRIVATE_REPOSITORY: ${{ vars.AMOSCLAUD_PRIVATE_REPOSITORY }}
          AMOSCLAUD_PRIVATE_TOKEN: ${{ secrets.AMOSCLAUD_PRIVATE_TOKEN }}
          AMOSCLAUD_PRIVACY_ONLY: '1'
        run: python -m amosclaud_bot.dispatcher

      - name: Classify Amosclaud issue request
        id: classify
        if: github.event_name == 'issue_comment'
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from amosclaud_bot.bot import parse_command

          payload = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8"))
          body = str((payload.get("comment") or {}).get("body") or "")
          command, _ = parse_command(body)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"write_request={'true' if command == 'fix' else 'false'}\n")
          PY

      - name: Check out pull request head
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/amosclaud-private-routed ]; then
            echo "Protected/private request stopped before PR-head checkout."
            exit 0
          fi
          gh pr checkout "${{ github.event.issue.number }}"

      - name: Prepare repair branch for issue
        if: >-
          github.event_name == 'issue_comment' &&
          !github.event.issue.pull_request &&
          steps.classify.outputs.write_request == 'true' &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        run: |
          if [ -f /tmp/amosclaud-private-routed ]; then
            echo "Protected/private request does not create a public repair branch."
            exit 0
          fi
          git switch -c "amosclaud-bot/fix-${{ github.event.issue.number }}-${{ github.run_id }}"

      - name: Run Amosclaud Bot dispatcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m amosclaud_bot.dispatcher

      - name: Verify real repair before publishing
        if: >-
          github.event_name == 'issue_comment' &&
          steps.classify.outputs.write_request == 'true' &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -Eeuo pipefail

          if [ -f /tmp/amosclaud-private-routed ]; then
            echo "Private work was routed away from this public workflow output."
            exit 0
          fi

          report_failure() {
            gh issue comment "$ISSUE_NUMBER" --body "### Amosclaud — Verification failed\n\n🟥 **Result:** FAILED\n\nThe requested repository change did not pass real verification. No successful repair is being claimed.\n\nDetails: see GitHub Actions."
          }
          trap report_failure ERR

          if git diff --quiet && git diff --cached --quiet; then
            trap - ERR
            gh issue comment "$ISSUE_NUMBER" --body "### Amosclaud — No change produced\n\n⬜ **Result:** NO CHANGES\n\nNo repository files were modified, so no repair or creation is being claimed."
            exit 1
          fi

          git diff --name-only > /tmp/amosclaud-changed-files.txt
          FILE_COUNT=$(wc -l < /tmp/amosclaud-changed-files.txt | tr -d ' ')

          python -m compileall -q amosclaud_bot src
          python -m pytest -q \
            tests/test_amosclaud_bot.py \
            tests/test_amosclaud_professional_review.py \
            tests/test_amosclaud_approval_gate.py \
            tests/test_amosclaud_privacy_gate.py \
            tests/test_amosclaud_comment_style.py

          trap - ERR
          {
            echo "### Amosclaud — Verified result"
            echo
            echo "🟩 **Result:** PASSED"
            echo "🟩 **Compilation:** PASSED"
            echo "🟩 **Tests:** PASSED"
            echo "**Files changed:** ${FILE_COUNT}"
            head -n 8 /tmp/amosclaud-changed-files.txt | sed 's/^/- `/' | sed 's/$/`/'
            if [ "$FILE_COUNT" -gt 8 ]; then
              echo "- ...and $((FILE_COUNT - 8)) more"
            fi
          } > /tmp/amosclaud-real-results.md

      - name: Commit and publish Amosclaud-Fixer changes
        if: >-
          github.event_name == 'issue_comment' &&
          steps.classify.outputs.write_request == 'true' &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -f /tmp/amosclaud-private-routed ]; then
            echo "Private work was routed away from public commit/PR publishing."
            exit 0
          fi

          if git diff --quiet && git diff --cached --quiet; then
            exit 1
          fi

          git config user.name "amosclaud-bot"
          git config user.email "amosclaud-bot@users.noreply.github.com"
          git add -A
          git commit -m "fix: Amosclaud-Fixer repair for #${{ github.event.issue.number }}"
          REPAIR_SHA=$(git rev-parse --short HEAD)

          if [ "${{ github.event.issue.pull_request != null }}" = "true" ]; then
            git push
            {
              cat /tmp/amosclaud-real-results.md
              echo "**Commit:** \`${REPAIR_SHA}\`"
              echo "**Pull request:** #${{ github.event.issue.number }}"
            } > /tmp/amosclaud-published-result.md
            gh pr comment "${{ github.event.issue.number }}" --body-file /tmp/amosclaud-published-result.md
          else
            git push -u origin HEAD
            PR_URL=$(gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$(git branch --show-current)" \
              --title "Amosclaud-Fixer: repair issue #${{ github.event.issue.number }}" \
              --body "Automated repair created by Amosclaud Bot through the repository-local Amosclaud Autonomous and Amosclaud-Fixer pipeline. The branch was only published after compilation and targeted bot verification tests passed.\n\nCloses #${{ github.event.issue.number }}")
            {
              cat /tmp/amosclaud-real-results.md
              echo "**Commit:** \`${REPAIR_SHA}\`"
              echo "**Pull request:** ${PR_URL}"
            } > /tmp/amosclaud-published-result.md
            gh issue comment "${{ github.event.issue.number }}" --body-file /tmp/amosclaud-published-result.md
          fi
