# This workflow installs Python dependencies, runs tests, and captures failures.

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  agent-status:
    runs-on: ubuntu-latest
    name: 🐦 Amosclaud-ai Status
    steps:
      - name: Report Agent Activity
        run: |
          echo "=================================================="
          echo "🐦 Amosclaud-ai is currently analyzing and working!"
          echo "=================================================="
          echo "🟢 Live & Active"

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint with flake8
        id: flake8
        shell: bash
        run: |
          set +e
          strict_log="flake8-strict-${{ matrix.python-version }}.log"
          report_log="flake8-report-${{ matrix.python-version }}.log"
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics >"$strict_log" 2>&1
          status=$?
          cat "$strict_log"
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics >"$report_log" 2>&1
          cat "$report_log"
          exit "$status"
      - name: Test with pytest
        id: pytest
        shell: bash
        run: |
          set +e
          pytest tests/ -v > pytest-${{ matrix.python-version }}.log 2>&1
          status=$?
          cat pytest-${{ matrix.python-version }}.log
          exit "$status"
      - name: Upload Python diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: python-${{ matrix.python-version }}-diagnostics
          path: |
            flake8-strict-${{ matrix.python-version }}.log
            flake8-report-${{ matrix.python-version }}.log
            pytest-${{ matrix.python-version }}.log
          if-no-files-found: warn
      - name: Report Python failure
        if: failure() && github.event_name == 'pull_request' && matrix.python-version == '3.12'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '### Python verification failed'
            echo
            if [ -s flake8-strict-${{ matrix.python-version }}.log ]; then
              echo '#### Strict flake8'
              echo '```text'
              tail -n 120 flake8-strict-${{ matrix.python-version }}.log
              echo '```'
            fi
            if [ -s pytest-${{ matrix.python-version }}.log ]; then
              echo '#### Pytest'
              echo '```text'
              tail -n 120 pytest-${{ matrix.python-version }}.log
              echo '```'
            fi
          } > python-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file python-comment.md
