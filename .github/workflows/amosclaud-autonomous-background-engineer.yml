name: Amosclaud Autonomous Background Engineer

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'
  workflow_run:
    workflows:
      - CI
      - Tests
      - Python verification
      - Build
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  checks: read

concurrency:
  group: amosclaud-autonomous-background-engineer-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  autonomous-background-repair:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install repository and verification dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio flake8

      - name: Verify Amosclaud bot configuration
        id: preflight
        env:
          AMOSCLAUD_API_KEY: ${{ secrets.AMOSCLAUD_API_KEY }}
        run: |
          test -f docs/PYTHON_AUTONOMOUS_ENGINEERING_BOOK.md
          test -f .github/scripts/amosclaud_fixer.py
          test -f .github/amosclaud-fixer/amosclaud-autonomous-agent/ci/bot-fixer-operations-autonomous-background-engineer/bot.py
          if [ -n "$AMOSCLAUD_API_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Autonomous background engineer skipped::Repository secret AMOSCLAUD_API_KEY is not configured, so the autonomous background engineer did not run. Add the secret to enable automated background repairs."
          fi

      - name: Run Amosclaud autonomous background engineer
        if: steps.preflight.outputs.configured == 'true'
        id: engineer
        env:
          AMOSCLAUD_API_KEY: ${{ secrets.AMOSCLAUD_API_KEY }}
          AMOSCLAUD_API_URL: ${{ vars.AMOSCLAUD_API_URL || 'http://www.amosclaud.com/' }}
          AMOSCLAUD_FIXER_MODEL: ${{ vars.AMOSCLAUD_FIXER_MODEL || 'amosclaud-agent' }}
          AMOSCLAUD_FIXER_ATTEMPTS: '3'
        run: |
          set +e
          python .github/amosclaud-fixer/amosclaud-autonomous-agent/ci/bot-fixer-operations-autonomous-background-engineer/bot.py | tee amosclaud-background-engineer-output.txt
          status=${PIPESTATUS[0]}
          set -e
          grep '^AMOSCLAUD_BACKGROUND_ENGINEER_STATUS=' amosclaud-background-engineer-output.txt >> "$GITHUB_OUTPUT" || true
          exit "$status"

      - name: Upload engineering evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amosclaud-background-engineer-${{ github.run_id }}
          path: |
            amosclaud-failure.log
            amosclaud-fixer-report.json
            amosclaud-background-engineer-report.json
            amosclaud-fix-attempt-*.patch
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish verified repair pull request
        if: steps.engineer.outputs.AMOSCLAUD_BACKGROUND_ENGINEER_STATUS == 'verified-repair'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          short_sha="${TARGET_SHA:0:8}"
          branch="amosclaud-background-engineer/${short_sha}-${GITHUB_RUN_ID}"
          git config user.name "Amosclaud Autonomous Background Engineer"
          git config user.email "background-engineer@amosclaud.internal"
          git checkout -b "$branch"
          git add -A -- \
            ':!.github/workflows' \
            ':!amosclaud-failure.log' \
            ':!amosclaud-fixer-report.json' \
            ':!amosclaud-background-engineer-report.json' \
            ':!amosclaud-fix-attempt-*.patch'
          git diff --cached --quiet && {
            echo "No verified source changes were produced"
            exit 1
          }
          git commit -m "fix: autonomous background repair for ${short_sha}"
          git push --set-upstream origin "$branch"
          {
            echo "## Amosclaud Autonomous Background Engineer"
            echo ""
            echo "This repair was generated using the Python Autonomous Engineering Book and was published only after Python compilation and the repository pytest suite passed."
            echo ""
            echo "- Source commit: \`${TARGET_SHA}\`"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Human review is still required before merge."
          } > /tmp/amosclaud-pr-body.md
          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$branch" \
            --title "fix: Amosclaud autonomous background repair" \
            --body-file /tmp/amosclaud-pr-body.md

      - name: Report unsuccessful autonomous repair
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Amosclaud background engineer needs owner review" \
            --body "The autonomous background engineer could not produce a verified repair. Review workflow run ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} and its uploaded evidence."
