name: 🤖 Amoscloud AI Feedback Loop

on:
  pull_request:
    types: [closed]

jobs:
  handle-denied-pr:
    if: github.event.pull_request.merged == false && contains(github.event.pull_request.labels.*.name, 'ai-generated')
    runs-on: ubuntu-latest
    name: AI Retry on Denied Change
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Trigger AI Re-Evaluation (Edit/Rewrite Faster)
        run: |
          echo "Changes were denied by the owner (George Makulu or other). Going back to edit/write faster."
          python src/amoscloud_ai/autonomous_agent.py --mode autonomous-retry --pr-number ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
