name: Amosclaud Command Center Receiver

on:
  workflow_dispatch:
    inputs:
      source_repository:
        description: Repository sending the command
        required: true
        type: string
      action:
        description: inspect, fix, verify, or monitor
        required: true
        type: choice
        options: [inspect, fix, verify, monitor]
      target_repository:
        description: Repository Amosclaud should work on
        required: true
        type: string
      objective:
        description: Human-readable engineering objective
        required: true
        type: string
      request_id:
        description: Unique dashboard request identifier
        required: true
        type: string
      command_issue:
        description: Amosclaud1 issue number used as the command record
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: amosclaud-command-${{ inputs.request_id }}
  cancel-in-progress: false

env:
  COMMAND_REPOSITORY: wamakologeorge-dev/Amosclaud1

jobs:
  authorize:
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.validate.outputs.target }}
    steps:
      - name: Validate trusted command
        id: validate
        env:
          SOURCE: ${{ inputs.source_repository }}
          TARGET: ${{ inputs.target_repository }}
          ACTION: ${{ inputs.action }}
          OBJECTIVE: ${{ inputs.objective }}
          REQUEST_ID: ${{ inputs.request_id }}
          ISSUE: ${{ inputs.command_issue }}
        run: |
          set -euo pipefail
          test "$SOURCE" = 'wamakologeorge-dev/Amosclaud1'
          case "$ACTION" in inspect|fix|verify|monitor) ;; *) exit 1 ;; esac
          case "$TARGET" in
            wamakologeorge-dev/amosclaude-clean|wamakologeorge-dev/workspace|wamakologeorge-dev/starter-workflows|wamakologeorge-dev/Amosclaud1) ;;
            *) echo 'Target is not allowlisted' >&2; exit 1 ;;
          esac
          test -n "$OBJECTIVE"
          test -n "$REQUEST_ID"
          [[ "$ISSUE" =~ ^[0-9]+$ ]]
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Return running acknowledgement
        env:
          GH_TOKEN: ${{ secrets.AMOSCLAUD_ENGINE_TOKEN }}
          ISSUE: ${{ inputs.command_issue }}
          ACTION: ${{ inputs.action }}
          TARGET: ${{ inputs.target_repository }}
          REQUEST_ID: ${{ inputs.request_id }}
        run: |
          set -euo pipefail
          cat > /tmp/running.md <<EOF
          ### Amosclaud engine accepted the command

          🟠 **Status:** RUNNING

          - Request: \`$REQUEST_ID\`
          - Action: \`$ACTION\`
          - Target: \`$TARGET\`

          The trusted-source, allowlist, and input-validation gates passed.
          EOF
          gh issue comment "$ISSUE" --repo "$COMMAND_REPOSITORY" --body-file /tmp/running.md

  inspect:
    if: inputs.action == 'inspect'
    needs: authorize
    runs-on: ubuntu-latest
    steps:
      - name: Inspect repository and return evidence
        env:
          GH_TOKEN: ${{ secrets.AMOSCLAUD_ENGINE_TOKEN }}
          TARGET: ${{ inputs.target_repository }}
          ISSUE: ${{ inputs.command_issue }}
          REQUEST_ID: ${{ inputs.request_id }}
        run: |
          set -euo pipefail
          repo_json="$(gh api "repos/$TARGET")"
          default_branch="$(jq -r '.default_branch' <<<"$repo_json")"
          head_sha="$(gh api "repos/$TARGET/commits/$default_branch" --jq '.sha')"
          workflow_count="$(gh api "repos/$TARGET/actions/workflows?per_page=100" --jq '.total_count' 2>/dev/null || echo unknown)"
          open_prs="$(gh api "repos/$TARGET/pulls?state=open&per_page=100" --jq 'length' 2>/dev/null || echo unknown)"
          cat > /tmp/inspection.md <<EOF
          ### Amosclaud inspection completed

          🟢 **Status:** COMPLETED

          - Request: \`$REQUEST_ID\`
          - Target: \`$TARGET\`
          - Default branch: \`$default_branch\`
          - Head commit: \`$head_sha\`
          - Workflows: \`$workflow_count\`
          - Open pull requests: \`$open_prs\`

          This was a read-only inspection. No repair is being claimed.
          EOF
          gh issue comment "$ISSUE" --repo "$COMMAND_REPOSITORY" --body-file /tmp/inspection.md

  verify:
    if: inputs.action == 'verify' || inputs.action == 'monitor'
    needs: authorize
    runs-on: ubuntu-latest
    steps:
      - name: Verify stable GitHub evidence and return result
        env:
          GH_TOKEN: ${{ secrets.AMOSCLAUD_ENGINE_TOKEN }}
          TARGET: ${{ inputs.target_repository }}
          ISSUE: ${{ inputs.command_issue }}
          REQUEST_ID: ${{ inputs.request_id }}
          ACTION: ${{ inputs.action }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          default_branch="$(gh api "repos/$TARGET" --jq '.default_branch')"
          head_sha="$(gh api "repos/$TARGET/commits/$default_branch" --jq '.sha')"
          normalized='[]'
          for attempt in 1 2 3; do
            raw="$(gh api -H 'Accept: application/vnd.github+json' "repos/$TARGET/commits/$head_sha/check-runs?per_page=100" 2>/dev/null || echo '{"check_runs":[]}')"
            normalized="$(jq --arg run_id "$CURRENT_RUN_ID" '
              [ .check_runs[]? | select((.details_url // "") | contains("/actions/runs/" + $run_id) | not) ]
              | sort_by(.started_at // .completed_at // "")
              | reduce .[] as $check ({}; .[$check.name] = $check)
              | [.[]]
            ' <<<"$raw")"
            pending_now="$(jq '[.[] | select(.status != "completed" or .conclusion == null)] | length' <<<"$normalized")"
            if (( pending_now == 0 || attempt == 3 )); then break; fi
            sleep 10
          done
          total="$(jq 'length' <<<"$normalized")"
          failed="$(jq '[.[] | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled" or .conclusion == "action_required" or .conclusion == "startup_failure")] | length' <<<"$normalized")"
          pending="$(jq '[.[] | select(.status != "completed" or .conclusion == null)] | length' <<<"$normalized")"
          passed="$(jq '[.[] | select(.conclusion == "success" or .conclusion == "neutral" or .conclusion == "skipped")] | length' <<<"$normalized")"
          failed_details="$(jq -r '.[] | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled" or .conclusion == "action_required" or .conclusion == "startup_failure") | "- **" + .name + "**: " + (.conclusion // "unknown")' <<<"$normalized")"
          pending_details="$(jq -r '.[] | select(.status != "completed" or .conclusion == null) | "- " + .name + ": " + (.status // "pending")' <<<"$normalized")"
          other_details="$(jq -r '.[] | select(.status == "completed" and (.conclusion != null)) | select(.conclusion != "failure" and .conclusion != "timed_out" and .conclusion != "cancelled" and .conclusion != "action_required" and .conclusion != "startup_failure") | "- " + .name + ": " + .conclusion' <<<"$normalized" | head -25)"
          if (( pending > 0 )); then verdict=PENDING; icon='🟡';
          elif (( failed > 0 )); then verdict=FAIL; icon='🔴';
          elif (( total == 0 )); then verdict=UNKNOWN; icon='⚪';
          else verdict=PASS; icon='🟢'; fi
          cat > /tmp/result.md <<EOF
          ### Amosclaud ${ACTION} result

          $icon **Verdict:** $verdict

          - Request: \`$REQUEST_ID\`
          - Target: \`$TARGET\`
          - Branch: \`$default_branch\`
          - Commit: \`$head_sha\`
          - Passed/neutral/skipped: \`$passed\`
          - Failed: \`$failed\`
          - Pending: \`$pending\`
          - Unique latest checks examined: \`$total\`

          #### Failed checks
          ${failed_details:-None.}

          #### Pending checks
          ${pending_details:-None.}

          #### Other latest check evidence
          ${other_details:-No additional check-run evidence was available.}

          The current Command Center receiver run is excluded, and only the latest record for each check name is evaluated. PENDING takes priority while evidence is still running. UNKNOWN is never reported as PASS.
          EOF
          gh issue comment "$ISSUE" --repo "$COMMAND_REPOSITORY" --body-file /tmp/result.md

  fix:
    if: inputs.action == 'fix'
    needs: authorize
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out trusted repair engine
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Install trusted repair runtime
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check -e . pytest pyyaml

      - name: Run deterministic Fixer, verify, publish PR, and return evidence
        env:
          GH_TOKEN: ${{ secrets.AMOSCLAUD_ENGINE_TOKEN }}
          TARGET: ${{ inputs.target_repository }}
          ISSUE: ${{ inputs.command_issue }}
          REQUEST_ID: ${{ inputs.request_id }}
          OBJECTIVE: ${{ inputs.objective }}
        run: |
          set -Eeuo pipefail
          workdir="$(mktemp -d)"
          branch="amosclaud-fixer/${REQUEST_ID}"
          encoded_token="$(printf '%s' "$GH_TOKEN" | jq -sRr @uri)"

          report_failure() {
            cat > /tmp/failure.md <<EOF
          ### Amosclaud repair failed

          🔴 **Result:** FAILED

          - Request: \`$REQUEST_ID\`
          - Target: \`$TARGET\`

          The repair or verification command failed. No successful repair is being claimed.
          EOF
            if [[ -s /tmp/amosclaud-repair-report.md ]]; then
              printf '\n#### Doctor evidence\n\n' >> /tmp/failure.md
              sed -n '1,120p' /tmp/amosclaud-repair-report.md >> /tmp/failure.md
            fi
            gh issue comment "$ISSUE" --repo "$COMMAND_REPOSITORY" --body-file /tmp/failure.md || true
          }
          trap report_failure ERR

          git clone --quiet "https://x-access-token:${encoded_token}@github.com/${TARGET}.git" "$workdir/target"
          cd "$workdir/target"
          default_branch="$(git branch --show-current)"
          before_sha="$(git rev-parse HEAD)"

          doctor_status=0
          python -m amoscloud_ai.repair_engine.cli . \
            --apply \
            --objective "$OBJECTIVE" \
            --memory /tmp/amosclaud-repair-memory.jsonl \
            --json /tmp/amosclaud-repair-report.json \
            --markdown /tmp/amosclaud-repair-report.md || doctor_status=$?

          mapfile -t changed < <(git status --porcelain | sed 's/^...//')

          if (( doctor_status != 0 )); then
            trap - ERR
            git reset --hard "$before_sha" >/dev/null
            cat > /tmp/verification-failed.md <<EOF
          ### Amosclaud repair result

          🔴 **Result:** VERIFICATION FAILED

          - Request: \`$REQUEST_ID\`
          - Target: \`$TARGET\`
          - Examined commit: \`$before_sha\`
          - Doctor exit code: \`$doctor_status\`
          - Repository changes published: \`no\`

          Doctor rejected the repair or found no verifiable safe repair. Any working-tree changes were rolled back.

          #### Doctor evidence

          EOF
            sed -n '1,140p' /tmp/amosclaud-repair-report.md >> /tmp/verification-failed.md
            gh issue comment "$ISSUE" --repo "$COMMAND_REPOSITORY" --body-file /tmp/verification-failed.md
            exit 0
          fi

          if (( ${#changed[@]} == 0 )); then
            trap - ERR
            cat > /tmp/no-change.md <<EOF
          ### Amosclaud repair result

          ⚪ **Result:** NO CHANGE

          - Request: \`$REQUEST_ID\`
          - Target: \`$TARGET\`
          - Examined commit: \`$before_sha\`
          - Doctor exit code: \`0\`

          Doctor found no safe deterministic change matching the objective.

          #### Doctor evidence

          EOF
            sed -n '1,140p' /tmp/amosclaud-repair-report.md >> /tmp/no-change.md
            gh issue comment "$ISSUE" --repo "$COMMAND_REPOSITORY" --body-file /tmp/no-change.md
            exit 0
          fi

          python - <<'PY'
          import json, py_compile, subprocess
          from pathlib import Path
          import yaml
          changed = subprocess.check_output(['git', 'status', '--porcelain'], text=True).splitlines()
          paths = [Path(line[3:]) for line in changed if len(line) > 3 and Path(line[3:]).is_file()]
          for path in paths:
              suffix = path.suffix.lower()
              if suffix == '.py':
                  py_compile.compile(str(path), doraise=True)
              elif suffix == '.json':
                  json.loads(path.read_text(encoding='utf-8'))
              elif suffix in {'.yml', '.yaml'}:
                  yaml.safe_load(path.read_text(encoding='utf-8'))
          print(f'Validated {len(paths)} changed files')
          PY

          git switch -c "$branch"
          git config user.name 'amosclaud-fixer[bot]'
          git config user.email 'amosclaud-fixer[bot]@users.noreply.github.com'
          git add -A
          git commit -m "fix: Amosclaud repair for ${REQUEST_ID}"
          repair_sha="$(git rev-parse HEAD)"
          git push --quiet -u origin "$branch"

          pr_url="$(gh pr create --repo "$TARGET" --base "$default_branch" --head "$branch" \
            --title "Amosclaud-Fixer: ${OBJECTIVE:0:80}" \
            --body "Automated deterministic repair for request \`$REQUEST_ID\`. Doctor passed the objective-scoped verification before publication. Full CI remains the independent final authority.")"

          files="$(git diff --name-only "$before_sha...$repair_sha" | sed 's/^/- `/' | sed 's/$/`/' | head -30)"
          trap - ERR
          cat > /tmp/final.md <<EOF
          ### Amosclaud repair published

          🟢 **Result:** REPAIR PR CREATED

          - Request: \`$REQUEST_ID\`
          - Target: \`$TARGET\`
          - Base commit: \`$before_sha\`
          - Repair commit: \`$repair_sha\`
          - Pull request: $pr_url
          - Doctor exit code before publication: \`0\`

          #### Files changed
          $files

          #### Doctor evidence

          EOF
          sed -n '1,140p' /tmp/amosclaud-repair-report.md >> /tmp/final.md
          gh issue comment "$ISSUE" --repo "$COMMAND_REPOSITORY" --body-file /tmp/final.md
