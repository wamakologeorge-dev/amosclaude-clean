name: Amosclaud Command Center Receiver

on:
  workflow_dispatch:
    inputs:
      source_repository:
        description: Repository sending the command
        required: true
        type: string
      action:
        description: inspect, fix, verify, or monitor
        required: true
        type: choice
        options: [inspect, fix, verify, monitor]
      target_repository:
        description: Repository Amosclaud should work on
        required: true
        type: string
      objective:
        description: Human-readable engineering objective
        required: true
        type: string
      request_id:
        description: Unique dashboard request identifier
        required: true
        type: string

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: amosclaud-command-${{ inputs.request_id }}
  cancel-in-progress: false

jobs:
  authorize-and-record:
    runs-on: ubuntu-latest
    steps:
      - name: Validate trusted command source
        env:
          SOURCE_REPOSITORY: ${{ inputs.source_repository }}
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
          ACTION: ${{ inputs.action }}
          OBJECTIVE: ${{ inputs.objective }}
          REQUEST_ID: ${{ inputs.request_id }}
        run: |
          set -euo pipefail
          test "$SOURCE_REPOSITORY" = "wamakologeorge-dev/Amosclaud1"
          case "$ACTION" in inspect|fix|verify|monitor) ;; *) exit 1 ;; esac
          case "$TARGET_REPOSITORY" in
            wamakologeorge-dev/amosclaude-clean|wamakologeorge-dev/workspace|wamakologeorge-dev/starter-workflows|wamakologeorge-dev/Amosclaud1) ;;
            *) echo "Target is not allowlisted" >&2; exit 1 ;;
          esac
          test -n "$OBJECTIVE"
          test -n "$REQUEST_ID"

      - name: Record approved request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTION: ${{ inputs.action }}
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
          OBJECTIVE: ${{ inputs.objective }}
          REQUEST_ID: ${{ inputs.request_id }}
          SOURCE_REPOSITORY: ${{ inputs.source_repository }}
        run: |
          set -euo pipefail
          cat > /tmp/request.md <<EOF
          ## Amosclaud Command Center request

          - **Request ID:** \`$REQUEST_ID\`
          - **Source:** \`$SOURCE_REPOSITORY\`
          - **Action:** \`$ACTION\`
          - **Target:** \`$TARGET_REPOSITORY\`
          - **Objective:** $OBJECTIVE
          - **Status:** AUTHORIZED AND QUEUED

          This request passed the source, action, target allowlist, and input validation gates. Execution remains subject to Amosclaud's repository approval, privacy, test, and truthfulness gates.
          EOF
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Command Center: ${ACTION} ${TARGET_REPOSITORY} [${REQUEST_ID}]" \
            --body-file /tmp/request.md

      - name: Publish receiver summary
        run: |
          {
            echo "# Amosclaud command accepted"
            echo
            echo "- Request: \`${{ inputs.request_id }}\`"
            echo "- Action: \`${{ inputs.action }}\`"
            echo "- Target: \`${{ inputs.target_repository }}\`"
            echo "- Source: \`${{ inputs.source_repository }}\`"
            echo
            echo "The request was authorized and entered into the Amosclaud audit queue."
          } >> "$GITHUB_STEP_SUMMARY"

  execute-inspect:
    if: ${{ inputs.action == 'inspect' }}
    needs: authorize-and-record
    runs-on: ubuntu-latest
    steps:
      - name: Inspect approved repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
          OBJECTIVE: ${{ inputs.objective }}
          REQUEST_ID: ${{ inputs.request_id }}
        run: |
          set -euo pipefail

          repo_json="$(gh api "repos/$TARGET_REPOSITORY")"
          default_branch="$(jq -r '.default_branch' <<<"$repo_json")"
          visibility="$(jq -r '.visibility // (if .private then "private" else "public" end)' <<<"$repo_json")"
          archived="$(jq -r '.archived' <<<"$repo_json")"
          open_issues="$(jq -r '.open_issues_count' <<<"$repo_json")"
          pushed_at="$(jq -r '.pushed_at' <<<"$repo_json")"
          head_sha="$(gh api "repos/$TARGET_REPOSITORY/commits/$default_branch" --jq '.sha')"
          workflow_count="$(gh api "repos/$TARGET_REPOSITORY/actions/workflows?per_page=100" --jq '.total_count' 2>/dev/null || echo unknown)"
          open_prs="$(gh api "repos/$TARGET_REPOSITORY/pulls?state=open&per_page=100" --jq 'length' 2>/dev/null || echo unknown)"
          root_files="$(gh api "repos/$TARGET_REPOSITORY/contents?ref=$default_branch" --jq '.[].name' 2>/dev/null | head -40 || true)"

          cat > /tmp/inspection.md <<EOF
          ## Autonomous inspection result

          - **Request ID:** \`$REQUEST_ID\`
          - **Target:** \`$TARGET_REPOSITORY\`
          - **Objective:** $OBJECTIVE
          - **Status:** INSPECTION COMPLETED

          ### Repository facts

          - Default branch: \`$default_branch\`
          - Current head: \`$head_sha\`
          - Visibility: \`$visibility\`
          - Archived: \`$archived\`
          - Last push: \`$pushed_at\`
          - Open issue count reported by GitHub: \`$open_issues\`
          - Open pull requests: \`$open_prs\`
          - GitHub Actions workflows: \`$workflow_count\`

          ### Root-level files and directories

          \`\`\`
          $root_files
          \`\`\`

          ### Truthfulness and safety note

          This was a read-only GitHub API inspection. No repository files, branches, pull requests, issues in the target repository, settings, or deployments were modified. Values marked \`unknown\` could not be read with the workflow token and must not be interpreted as zero.
          EOF

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Inspection result: ${TARGET_REPOSITORY} [${REQUEST_ID}]" \
            --body-file /tmp/inspection.md

          cat /tmp/inspection.md >> "$GITHUB_STEP_SUMMARY"

  execute-verify:
    if: ${{ inputs.action == 'verify' }}
    needs: authorize-and-record
    runs-on: ubuntu-latest
    steps:
      - name: Verify approved repository from GitHub evidence
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
          OBJECTIVE: ${{ inputs.objective }}
          REQUEST_ID: ${{ inputs.request_id }}
        run: |
          set -euo pipefail

          repo_json="$(gh api "repos/$TARGET_REPOSITORY")"
          default_branch="$(jq -r '.default_branch' <<<"$repo_json")"
          head_sha="$(gh api "repos/$TARGET_REPOSITORY/commits/$default_branch" --jq '.sha')"

          status_json="$(gh api "repos/$TARGET_REPOSITORY/commits/$head_sha/status" 2>/dev/null || echo '{"state":"unknown","statuses":[]}')"
          combined_state="$(jq -r '.state // "unknown"' <<<"$status_json")"
          status_count="$(jq -r '.statuses | length' <<<"$status_json")"

          checks_json="$(gh api -H 'Accept: application/vnd.github+json' "repos/$TARGET_REPOSITORY/commits/$head_sha/check-runs?per_page=100" 2>/dev/null || echo '{"total_count":0,"check_runs":[]}')"
          check_count="$(jq -r '.total_count // 0' <<<"$checks_json")"
          successful_checks="$(jq '[.check_runs[]? | select(.conclusion == "success" or .conclusion == "neutral" or .conclusion == "skipped")] | length' <<<"$checks_json")"
          failed_checks="$(jq '[.check_runs[]? | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled" or .conclusion == "action_required" or .conclusion == "startup_failure")] | length' <<<"$checks_json")"
          pending_checks="$(jq '[.check_runs[]? | select(.status != "completed" or .conclusion == null)] | length' <<<"$checks_json")"

          runs_json="$(gh api "repos/$TARGET_REPOSITORY/actions/runs?branch=$default_branch&per_page=20" 2>/dev/null || echo '{"total_count":0,"workflow_runs":[]}')"
          recent_run_count="$(jq -r '.workflow_runs | length' <<<"$runs_json")"
          successful_runs="$(jq '[.workflow_runs[]? | select(.conclusion == "success")] | length' <<<"$runs_json")"
          failed_runs="$(jq '[.workflow_runs[]? | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled" or .conclusion == "action_required" or .conclusion == "startup_failure")] | length' <<<"$runs_json")"
          pending_runs="$(jq '[.workflow_runs[]? | select(.status != "completed" or .conclusion == null)] | length' <<<"$runs_json")"

          if (( failed_checks > 0 || failed_runs > 0 )); then
            verdict="FAIL"
            reason="GitHub reports at least one failed check or recent workflow run."
          elif (( pending_checks > 0 || pending_runs > 0 )); then
            verdict="PENDING"
            reason="Verification evidence is still running or incomplete."
          elif (( check_count == 0 && status_count == 0 && recent_run_count == 0 )); then
            verdict="UNKNOWN"
            reason="No CI status, check run, or workflow-run evidence was available."
          elif [[ "$combined_state" == "failure" || "$combined_state" == "error" ]]; then
            verdict="FAIL"
            reason="The combined commit status is not successful."
          elif [[ "$combined_state" == "pending" ]]; then
            verdict="PENDING"
            reason="The combined commit status is pending."
          else
            verdict="PASS"
            reason="Available GitHub check and workflow evidence contains no failure or pending result."
          fi

          check_details="$(jq -r '.check_runs[]? | "- " + .name + ": " + (.conclusion // .status // "unknown")' <<<"$checks_json" | head -30)"
          run_details="$(jq -r '.workflow_runs[]? | "- " + .name + ": " + (.conclusion // .status // "unknown") + " (" + .event + ")"' <<<"$runs_json" | head -20)"

          cat > /tmp/verification.md <<EOF
          ## Autonomous verification result

          - **Request ID:** \`$REQUEST_ID\`
          - **Target:** \`$TARGET_REPOSITORY\`
          - **Objective:** $OBJECTIVE
          - **Default branch:** \`$default_branch\`
          - **Verified head:** \`$head_sha\`
          - **Verdict:** **$verdict**
          - **Reason:** $reason

          ### Evidence summary

          - Combined commit status: \`$combined_state\`
          - Commit status contexts: \`$status_count\`
          - Check runs found: \`$check_count\`
          - Successful/neutral/skipped checks: \`$successful_checks\`
          - Failed checks: \`$failed_checks\`
          - Pending checks: \`$pending_checks\`
          - Recent default-branch workflow runs examined: \`$recent_run_count\`
          - Successful recent runs: \`$successful_runs\`
          - Failed recent runs: \`$failed_runs\`
          - Pending recent runs: \`$pending_runs\`

          ### Check runs

          ${check_details:-No check-run details were available.}

          ### Recent workflow runs

          ${run_details:-No workflow-run details were available.}

          ### Truthfulness and safety note

          This verification is read-only. It evaluates GitHub's recorded status, check-run, and workflow-run evidence for the current default-branch head. It does not claim that tests were executed by this receiver, and it does not modify repository files, branches, pull requests, settings, or deployments. A PASS means the available evidence was complete and contained no failure or pending result; UNKNOWN means evidence was unavailable.
          EOF

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Verification result: ${TARGET_REPOSITORY} — ${verdict} [${REQUEST_ID}]" \
            --body-file /tmp/verification.md

          cat /tmp/verification.md >> "$GITHUB_STEP_SUMMARY"

          if [[ "$verdict" == "FAIL" ]]; then
            exit 1
          fi
