name: Amosclaud Autonomous Engine Injection Loop

on:
  push:
    branches: [ main, dev, copilot/explore-codebase ]
  pull_request:
    branches: [ main, copilot/explore-codebase ]

jobs:
  autonomous-self-healing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: \${{ secrets.GITHUB_TOKEN }}

      - name: Mobile Workspace Hotfixes & Error Cleanup
        run: |
          echo "🧹 Running autonomous hotfixes for mobile pull-request..."
          
          # 1. Force remove the accidental bytecode cache file from the environment
          if [ -f "src/__pycache__/__init__.cpython-312.pyc" ]; then
            rm -rf "src/__pycache__"
            echo "✅ Successfully purged pycache binary leak from the runner tracking tree."
          fi
          
          # 2. Add an absolute internal system fallback layer for the spelling mismatch
          # This maps amosclaudai (Android package) directly to amoscloud_ai (Backend namespace)
          if [ -d "src/amoscloud_ai" ] && [ ! -d "src/amosclaudai" ]; then
            ln -s amoscloud_ai src/amosclaudai
            echo "✅ Created directory fallback symlink to bridge the amoscloud vs amosclaudai spelling mismatch."
          fi

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Local AI Runner Stack
        run: |
          pip install ollama pydantic pytest flake8 fastapi uvicorn
          curl -fsSL https://ollama.com | sh
          ollama serve > /dev/null 2>&1 &
          sleep 5
          ollama pull qwen2.5-coder:3b

      - name: Execute Autonomous Injection and Fix Loop
        run: |
          cat << 'EOF' > autonomous_runner.py
          import subprocess
          import os
          import re
          import json
          import time

          MAX_ATTEMPTS = 10

          def run_verification_suite():
              """Runs local syntax checks across backend entry points."""
              result = subprocess.run(["flake8", "main.py"], capture_output=True, text=True)
              return result.returncode, result.stdout

          def query_local_codex(error_logs, file_content):
              import http.client
              prompt = (
                  f"You are an embedded autonomous self-healing agent running inside a GitHub Action pipeline.\n"
                  f"The project validation check failed. Fix the errors sequentially.\n\n"
                  f"--- CRASH TRACE LOGS ---\n{error_logs}\n\n"
                  f"--- CURRENT FILE TARGET CONTENT ---\n{file_content}\n\n"
                  f"Apply the required corrections. Return ONLY the raw, updated file content. "
                  f"Do not write markdown formatting wrappers like ```python, explanations, or text summaries."
              )
              conn = http.client.HTTPConnection("localhost", 11434)
              payload = json.dumps({
                  "model": "qwen2.5-coder:3b",
                  "prompt": prompt,
                  "stream": False,
                  "options": {"temperature": 0.1}
              })
              headers = {'Content-Type': 'application/json'}
              conn.request("POST", "/api/generate", payload, headers)
              res = conn.getresponse()
              return json.loads(res.read().decode())['response'].strip()

          def start_autonomous_healing_loop():
              print("🚀 Starting Amosclaud Autonomous Injection Engine...")
              for cycle in range(1, MAX_ATTEMPTS + 1):
                  exit_code, logs = run_verification_suite()
                  if exit_code == 0:
                      print(f"✨ Success! The repository code is fully fixed and verified after {cycle-1} self-healing reloads.")
                      return True
                  print(f"❌ [Reload Attempt {cycle}/{MAX_ATTEMPTS}] Build failed. Launching injection layer...")
                  
                  target_file = "main.py"
                  if not os.path.exists(target_file):
                      with open(target_file, "w") as f:
                          f.write("# Auto-generated entrypoint\nfrom fastapi import FastAPI\napp = FastAPI()\n")
                  
                  with open(target_file, "r", encoding="utf-8") as f:
                      current_code = f.read()
                      
                  fixed_code = query_local_codex(logs, current_code)
                  fixed_code = re.sub(r"^```python\n", "", fixed_code)
                  fixed_code = re.sub(r"\n```$", "", fixed_code)
                  
                  with open(target_file, "w", encoding="utf-8") as f:
                      f.write(fixed_code)
                  time.sleep(2)
              return False

          if __name__ == "__main__":
              if not start_autonomous_healing_loop():
                  exit(1)
          EOF

          python autonomous_runner.py

      - name: Programmatically Push Verified Code Mutations to Branch
        if: success()
        run: |
          rm -f autonomous_runner.py
          git config user.name "Amosclaud Codex Agent [CI]"
          git config user.email "agent-engine@amosclaud.com"
          
          # Clean up the local tracking index to make sure deleted pycache binaries are wiped out from git records
          git rm --cached -r src/__pycache__ --ignore-unmatch || true
          
          if ! git diff --exit-code; then
            git add .
            git commit -m "fix(agent): autonomously resolved mobile PR conflicts, path spelling drifts, and binary bugs"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          else
            echo "No structural code differences detected. Workspace is pristine."
          fi
