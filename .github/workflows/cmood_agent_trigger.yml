# .github/workflows/cmood_agent_trigger.yml
name: cmood Autonomous Agent Trigger

on:
  push:
    branches:
      - main
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  run_cmood_agent:
    if: github.event_name != 'issue_comment' || (contains(github.event.comment.body, '/cmood') && github.event.issue.pull_request)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: cmood/requirements.txt

      - name: Install cmood dependencies
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --upgrade pip
          cd cmood
          python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Verify cmood module imports
        run: |
          set -euo pipefail
          python -c "import cmood.agent; print('cmood.agent import verified')"

      - name: Execute cmood agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "cmood start job output should show running..."
          python -m cmood.agent --task "process_latest_changes" --repo "${{ github.repository }}" --ref "${{ github.sha }}"
          echo "cmood agent completed successfully"
