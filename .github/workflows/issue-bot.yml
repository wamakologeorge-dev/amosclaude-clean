name: 🤖 Amosclaude-AI Issue Bot

# Trigger on every new comment posted on a GitHub Issue.
# This workflow does NOT require GitHub Copilot – it uses the Claude (Anthropic)
# API directly via the ANTHROPIC_API_KEY repository secret.
on:
  issue_comment:
    types: [created]

# Only run on issue comments (not pull-request comments)
# and never on comments from bots.
jobs:
  respond:
    # Skip comments that are on pull requests (issue_comment fires for both)
    if: >
      github.event.issue.pull_request == null &&
      !contains(github.event.comment.user.login, '[bot]') &&
      github.event.comment.user.login != 'github-actions'

    runs-on: ubuntu-latest
    name: Respond to issue comment

    # Minimum permissions – no Copilot or special agent permissions needed.
    permissions:
      contents: write       # read files + create branches + push commits
      issues: write         # post comments on issues
      pull-requests: write  # open pull requests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests

      - name: Run Amosclaude-AI issue bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-3-5-sonnet-20241022' }}
        run: python scripts/issue_bot.py
