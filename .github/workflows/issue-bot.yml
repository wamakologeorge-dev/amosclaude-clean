name: 🤖 Amosclaude-AI Issue Bot

# Legacy issue assistant retained for compatibility, but it is opt-in only.
# Canonical @amosclaud / @amosclaud-bot commands are owned exclusively by
# .github/workflows/amosclaud-bot.yml and the Amosclaud Python dispatcher.
on:
  issue_comment:
    types: [created]

jobs:
  respond:
    # Run only for explicit legacy-assistant requests on issues, never PR comments
    # and never bot-authored comments. This prevents duplicate responses and keeps
    # approval-gated Amosclaud commands under the canonical dispatcher.
    if: >
      github.event.issue.pull_request == null &&
      !contains(github.event.comment.user.login, '[bot]') &&
      github.event.comment.user.login != 'github-actions' &&
      (startsWith(github.event.comment.body, '@amosclaude-ai') ||
       startsWith(github.event.comment.body, '@Amosclaude-AI'))

    runs-on: ubuntu-latest
    name: Respond to explicit legacy assistant request

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests

      - name: Run Amosclaude-AI issue bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-3-5-sonnet-20241022' }}
        run: python scripts/issue_bot.py
