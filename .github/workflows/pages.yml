name: Deploy Amosclaud Agent Issue Hub

on:
  push:
    branches: ["main"]
    paths:
      - "pages-site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main project
        uses: actions/checkout@v7

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Verify Pages hub is static and token-free
        run: |
          set -Eeuo pipefail
          test -f pages-site/index.html
          test -f pages-site/styles.css
          test -f pages-site/hub.css
          test -f pages-site/app.js
          test ! -f pages-site/login.html
          test ! -f pages-site/account-access.js
          test ! -f pages-site/CNAME
          ! grep -RIE "(github_pat_|ghp_|authorization:[[:space:]]*bearer|localStorage.*token|sessionStorage.*token)" pages-site
          grep -q "Amosclaud Agent Issue Hub" pages-site/index.html
          grep -q "No GitHub token is collected or stored" pages-site/index.html
          grep -q "wamakologeorge-dev/Amosclaud1" pages-site/app.js
          grep -q "wamakologeorge-dev/amosclaude-clean" pages-site/app.js
          grep -q "issues/new" pages-site/app.js
          grep -q "command-timeline" pages-site/index.html

      - name: Upload main Agent Issue Hub
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Agent Issue Hub
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Wait for and verify deployed GitHub Page
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -Eeuo pipefail
          curl \
            --location \
            --fail \
            --retry 12 \
            --retry-delay 10 \
            --retry-all-errors \
            --connect-timeout 15 \
            --max-time 30 \
            "$PAGE_URL" \
            -o deployment-evidence.html
          grep -q "Amosclaud Agent Issue Hub" deployment-evidence.html
          grep -q "No GitHub token is collected or stored" deployment-evidence.html

      - name: Upload deployment evidence
        uses: actions/upload-artifact@v4
        with:
          name: agent-issue-hub-deployment-evidence
          path: deployment-evidence.html
