name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  agent-status:
    runs-on: ubuntu-latest
    name: 🐦 Amosclaud-ai Status
    steps:
      - name: Report Agent Activity
        run: |
          echo "=================================================="
          echo "🐦 Amosclaud-ai is currently analyzing and working!"
          echo "=================================================="
          echo "🟢 Live & Active"

  build:
    needs: agent-status
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
