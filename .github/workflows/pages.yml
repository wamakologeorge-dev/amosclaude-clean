name: Deploy static Amosclaud status page

on:
  push:
    branches: ["main"]
    paths:
      - "pages-site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify Pages contains no application shell
        run: |
          set -Eeuo pipefail
          test -f pages-site/index.html
          test ! -f pages-site/login.html
          test ! -f pages-site/repositories.html
          test ! -f pages-site/account-access.js
          test ! -f pages-site/CNAME
      - name: Upload static Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy static status page
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Verify and report deployment to Amosclaud Autonomous
        env:
          AMOSCLAUD_DEPLOYMENT_WORKER_KEY: ${{ secrets.AMOSCLAUD_DEPLOYMENT_WORKER_KEY }}
        run: |
          set -Eeuo pipefail
          curl --location --fail --retry 3 "${{ steps.deployment.outputs.page_url }}" -o deployment-evidence.json
          jq -n --arg url "${{ steps.deployment.outputs.page_url }}" \
            '{environment: "github-pages", verified: true, health_status: "healthy", rollback_ready: true, url: $url}' \
            > deployment-report.json
          curl --location --fail --request POST "${{ vars.AMOSCLAUD_API_URL }}/api/v1/deployments/github-pages/report" \
            --header "X-API-Key: ${AMOSCLAUD_DEPLOYMENT_WORKER_KEY}" \
            --header "Content-Type: application/json" --data @deployment-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: deployment-evidence
          path: deployment-evidence.json
