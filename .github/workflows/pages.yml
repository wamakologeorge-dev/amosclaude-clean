name: Deploy static Amosclaud status page

on:
  push:
    branches: ["main"]
    paths:
      - "pages-site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify Pages contains no application shell
        run: |
          set -Eeuo pipefail
          test -f pages-site/index.html
          test ! -f pages-site/login.html
          test ! -f pages-site/repositories.html
          test ! -f pages-site/account-access.js
          test ! -f pages-site/CNAME
      - name: Upload static Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy static status page
        id: deployment
        uses: actions/deploy-pages@v5
