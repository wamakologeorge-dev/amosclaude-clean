name: Fortify AST Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "25 0 * * 1"
  workflow_dispatch:

jobs:
  fortify-ast-scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    env:
      FOD_URL: https://ams.fortify.com
      FOD_TENANT: ${{ secrets.FOD_TENANT }}
      FOD_USER: ${{ secrets.FOD_USER }}
      FOD_PASSWORD: ${{ secrets.FOD_PAT }}
      SSC_URL: ${{ vars.SSC_URL }}
      SSC_TOKEN: ${{ secrets.SSC_TOKEN }}
      SC_SAST_TOKEN: ${{ secrets.SC_CLIENT_AUTH_TOKEN }}
      DEBRICKED_TOKEN: ${{ secrets.DEBRICKED_TOKEN }}
    steps:
      - name: Check out source code
        uses: actions/checkout@v4

      - name: Detect configured Fortify provider
        id: config
        shell: bash
        run: |
          if [ -n "$FOD_TENANT" ] && [ -n "$FOD_USER" ] && [ -n "$FOD_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "provider=fod" >> "$GITHUB_OUTPUT"
          elif [ -n "$SSC_URL" ] && [ -n "$SSC_TOKEN" ] && [ -n "$SC_SAST_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "provider=ssc" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "provider=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Run configured Fortify scan
        if: steps.config.outputs.enabled == 'true'
        uses: fortify/github-action@0540f6aefd95d12a5fbed40f406d825fad64330e
        with:
          sast-scan: true
          debricked-sca-scan: ${{ env.DEBRICKED_TOKEN != '' }}

      - name: Report Fortify unavailable
        if: steps.config.outputs.enabled != 'true'
        run: |
          echo "Fortify scan was not run because no complete Fortify provider configuration is available."
          echo "Configure either FOD_TENANT/FOD_USER/FOD_PAT or SSC_URL/SSC_TOKEN/SC_CLIENT_AUTH_TOKEN to enable this scan."
