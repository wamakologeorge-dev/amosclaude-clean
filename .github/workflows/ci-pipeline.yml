name: Amosclaud CI/CD Pipeline

on:
  push:
    branches:
      - '**' # Triggers on all branches, including main
  workflow_dispatch:

# Grants write access so Amosclaud-fixee can automatically repair and push broken files
permissions:
  contents: write

jobs:
  autonomous-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Architecture Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic httpx flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 1: Run Guardrail and Boundary Validation (Amosclaud-ai & Amosclaud-fixee Loop)
      - name: Run Guardrail and Boundary Validation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Executing compile-time guardrail analysis under Amosclaud-ai..."
          pip install fastapi uvicorn pydantic httpx flake8 pytest pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Task Loop Block: Runs testing logic under core system parameters
      - name: Run Guardrail Analysis Matrix
        id: run_guardrails
        continue-on-error: true # Prevents the pipeline runner from breaking early before the bot can log data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "================================================================"
          echo "🤖 BACKGROUND ORCHESTRATION: EXECUTING AUTOMATED INTEGRITY TESTS"
          echo "================================================================"
          python main.py --test-guardrails
          echo "GUARDRAILS_EXIT_CODE=$?" >> $GITHUB_ENV

      # Step 2: Deploy ONLY if guardrails pass successfully
      - name: Deploy to Amosclaud AI Platform
        if: success()
        env:
          AMOSCLOUD_API_TOKEN: ${{ secrets.AMOSCLOUD_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QUIQ_API_KEY: ${{ secrets.QUIQ_API_KEY }}
        run: |
          echo "Deployment safety threshold cleared. Initiating production server handoffs..."
          python main.py --deploy
      # Reporting Block: Executes on success, prompting the bot to log a positive metric report
      - name: Report Success to Repository
        if: env.GUARDRAILS_EXIT_CODE == '0'
        run: |
          echo "Pipeline successful. Instructing bot to append green status logs..."
          python report_bot.py --status success

      # Reporting Block: Executes on failure, prompting the bot to write error telemetry details
      - name: Report Failure to Repository
        if: env.GUARDRAILS_EXIT_CODE != '0'
        run: |
          echo "Pipeline anomalies detected. Instructing bot to log red warning flags..."
          python report_bot.py --status failure
          # Enforce proper final runner status tracking
          exit 1
