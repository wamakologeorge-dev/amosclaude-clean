name: AmosCloud Continuous Integration and Deployment

on:
  push:
    branches:
      - '**' # Triggers on all branches, including amosclaud-setting-v*
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 🔒 Step 1: Run Guardrail and Boundary Validation
      - name: Run Guardrail and Boundary Validation
        run: |
          echo "Executing compile-time guardrail assertions..."
          python main.py --test-guardrails

      # 🚀 Step 2: Deploy ONLY if guardrails pass 100%
      - name: Deploy to Amoscloud AI Platform
        if: success()
        env:
          AMOSCLOUD_API_TOKEN: ${{ secrets.AMOSCLOUD_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QUIQ_API_KEY: ${{ secrets.QUIQ_API_KEY }}
        run: |
          python main.py --deploy

      # 🚨 Step 3: Trigger Automated Alert if guardrails fail
      - name: Auto-Create Security Issue on Failure
        if: failure() # 👈 Executed only if a code test fails or blocks an exploit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Built-in GitHub token, no configuration needed
        run: |
          echo "Guardrail breach detected! Generating automatic incident log..."
          gh issue create \
            --title "🚨 SECURITY BREACH: Architectural Guardrail Violation" \
            --body "### Incident Details
            - **Triggered By**: @${{ github.actor }}
            - **Branch**: \`${{ github.ref_name }}\`
            - **Commit SHA**: ${{ github.sha }}
            - **Status**: Deployment to \`amosclaud.com\` blocked.
            
            **Action Required**: Check the latest GitHub Actions runner logs immediately. A file has attempted to cross an allowed boundary layout or an AI endpoint leaked restricted data." \
            --label "bug" \
            --label "security"
