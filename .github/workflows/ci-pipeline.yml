name: Amosclaud CI/CD Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  autonomous-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Architecture Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest pytest-asyncio

      - name: Run Guardrail and Boundary Validation
        id: run_guardrails
        continue-on-error: true
        run: |
          echo "Executing compile-time guardrail analysis under Amosclaud..."
          set +e
          python main.py --test-guardrails
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit "${exit_code}"

      - name: Verify Amosclaud Platform Handoff
        if: steps.run_guardrails.outcome == 'success'
        run: |
          echo "Deployment safety threshold cleared. Verifying Amosclaud platform readiness..."
          python -m amosclaud_platform doctor

      - name: Report Success to Repository
        if: steps.run_guardrails.outcome == 'success'
        run: |
          echo "Amosclaud guardrails and platform readiness checks passed."
          if [ -f report_bot.py ]; then python report_bot.py --status success; fi

      - name: Report Failure to Repository
        if: steps.run_guardrails.outcome == 'failure'
        run: |
          echo "Amosclaud guardrail validation failed with exit code ${{ steps.run_guardrails.outputs.exit_code }}."
          if [ -f report_bot.py ]; then python report_bot.py --status failure; fi
          exit 1
