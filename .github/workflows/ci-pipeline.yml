name: Amosclaud CI/CD Pipeline

on:
  push:
    branches:
      - '**' # Triggers automatically across all active staging paths
  workflow_dispatch:

# Grants write privileges so Amosclaud-fixee can patch and commit repairs autonomously
permissions:
  contents: write

jobs:
  autonomous-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Architecture Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic httpx flake8 pytest pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Runs the main script. If it hits an error, Amosclaud-fixee hooks into the thread,
      # patches the code, pushes the fix, and updates the branch.
      - name: Run Guardrail Analysis Matrix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "================================================================"
          echo "🤖 BACKGROUND ORCHESTRATION: EXECUTING AUTOMATED INTEGRITY TESTS"
          echo "================================================================"
          python main.py --test-guardrails

      # Fires the delivery sequence automatically once tests pass or repairs are applied
      - name: Execute Server Delivery Sequence
        if: success()
        env:
          AMOSCLOUD_API_TOKEN: ${{ secrets.AMOSCLOUD_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QUIQ_API_KEY: ${{ secrets.QUIQ_API_KEY }}
        run: |
          echo "All guardrails passed. Shipping verified build tracking nodes..."
          python main.py --deploy
