name: AmosCloud Continuous Integration and Deployment

on:
  push:
    branches:
      - '**' # Triggers on all branches, including amosclaud-setting-v*
  workflow_dispatch: # Allows manual UI execution from amosclaud.com

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Step 1: Ensure clean environments and packages
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 2: Validate System Code and Enforce Static Contract Checks 🔒
      - name: Run Guardrail and Boundary Validation
        run: |
          echo "Executing compile-time guardrail assertions..."
          python main.py --test-guardrails

      # Step 3: Proceed with live environment sync ONLY if step 2 passes 🚀
      - name: Deploy to Amoscloud AI Platform
        if: success() # Only executes if the guardrail validation passes 100%
        env:
          AMOSCLOUD_API_TOKEN: ${{ secrets.AMOSCLOUD_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QUIQ_API_KEY: ${{ secrets.QUIQ_API_KEY }}
        run: |
          echo "All structural guardrails verified. Initiating deployment..."
          python main.py --deploy
