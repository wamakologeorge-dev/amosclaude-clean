name: Amosclaud Model Server

on:
  pull_request:
    branches: ["main"]
    paths:
      - "amoscloud_ai/model_server/**"
      - "src/agent/prompts.py"
      - "tests/test_model_server.py"
      - "requirements-model-server.txt"
      - ".github/workflows/amosclaud-model-server.yml"
  push:
    branches: ["main"]
    paths:
      - "amoscloud_ai/model_server/**"
      - "src/agent/prompts.py"
      - "tests/test_model_server.py"
      - "requirements-model-server.txt"
      - ".github/workflows/amosclaud-model-server.yml"

permissions:
  contents: read

jobs:
  verify-model-server:
    name: Verify model server (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-model-server.txt

      - name: Install lightweight verification tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 pytest

      - name: Compile model-server and canonical prompts
        run: |
          python -m compileall -q amoscloud_ai/model_server
          python -m py_compile src/agent/prompts.py

      - name: Lint model-server boundary
        run: |
          flake8 amoscloud_ai/model_server src/agent/prompts.py tests/test_model_server.py \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
          flake8 amoscloud_ai/model_server src/agent/prompts.py tests/test_model_server.py \
            --count \
            --max-complexity=12 \
            --max-line-length=88 \
            --show-source \
            --statistics

      - name: Install PyTorch model-server dependency
        run: |
          python -m pip install -r requirements-model-server.txt

      - name: Run focused model-server tests
        run: |
          pytest tests/test_model_server.py -v
