name: 🏗️ Platform Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    name: Build & verify Docker image

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t amoscloud-ai:test .

      - name: Start container
        run: |
          docker run -d --name amoscloud_test \
            -e DATABASE_URL=sqlite:///./amoscloud.db \
            -e SECRET_KEY=test-secret \
            -p 8000:8000 \
            amoscloud-ai:test

      - name: Wait for container health
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health; then
              echo "✅ Container is healthy!"
              break
            fi
            echo "Waiting... attempt $i"
            sleep 3
          done

      - name: Verify dashboard loads
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/)
          echo "Dashboard HTTP status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Dashboard is live!" || exit 1

      - name: Show health
        run: curl -s http://localhost:8000/health | python3 -m json.tool

      - name: Cleanup
        if: always()
        run: docker rm -f amoscloud_test || true
