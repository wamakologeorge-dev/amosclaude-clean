name: Android Native

on:
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-native.yml'
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-native.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Compile debug APK
        id: compile
        shell: bash
        run: |
          set +e
          gradle --no-daemon --console=plain clean assembleDebug > android-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 200 android-build.log > android-build-tail.log
            cat android-build-tail.log
          fi
          exit "$status"

      - name: Upload Android build diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-build-diagnostics
          path: |
            android/android-build.log
            android/android-build-tail.log
          if-no-files-found: warn

      - name: Report Android build failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '### Android build failed'
            echo
            echo '```text'
            tail -n 120 android-build.log
            echo '```'
          } > ../android-build-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file ../android-build-comment.md

      - name: Run unit tests
        run: gradle --no-daemon --console=plain testDebugUnitTest

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: amosclaud-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
