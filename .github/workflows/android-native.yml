name: Android Native

on:
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-native.yml'
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-native.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Compile debug APK
        run: gradle --no-daemon clean assembleDebug

      - name: Run unit tests
        run: gradle --no-daemon testDebugUnitTest

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: amosclaud-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
