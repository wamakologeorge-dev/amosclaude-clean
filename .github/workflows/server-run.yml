name: 🚀 Amosclaud AI — Live Server Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-server:
    runs-on: ubuntu-latest
    name: Start & verify Amosclaud AI server

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Amosclaud AI server
        run: |
          mkdir -p data/repositories
          python -m uvicorn amoscloud_ai.main:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"
          echo "Server started with PID $SERVER_PID"
        env:
          ENVIRONMENT: development
          AUTH_DB_PATH: ./data/test-auth.db
          REPOSITORY_STORAGE_PATH: ./data/repositories
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: github-actions-secret-key-with-at-least-32-characters
          AUTH_COOKIE_SECURE: "false"
          LOG_LEVEL: INFO

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health; then
              echo "✅ Server is up!"
              exit 0
            fi
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "❌ Server process exited early"
              cat server.log
              exit 1
            fi
            echo "Attempt $i failed, retrying in 2s..."
            sleep 2
          done
          echo "❌ Server did not become ready after 30 attempts"
          cat server.log
          exit 1

      - name: Verify health and secured dashboard flow
        run: |
          RESPONSE=$(curl -s http://127.0.0.1:8000/health)
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | python -c "import sys, json; d=json.load(sys.stdin); assert d['status']=='ok', f'Expected ok, got {d}'; print('✅ Health check passed!')"

          ROOT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/)
          ROOT_LOCATION=$(curl -s -D - -o /dev/null http://127.0.0.1:8000/ | tr -d '\r' | awk 'tolower($1)=="location:" {print $2}')
          LOGIN_STATUS=$(curl -s -o /tmp/login.html -w "%{http_code}" http://127.0.0.1:8000/login)
          [ "$ROOT_STATUS" = "302" ]
          [ "$ROOT_LOCATION" = "/login" ]
          [ "$LOGIN_STATUS" = "200" ]
          grep -q "Amosclaud" /tmp/login.html
          echo "✅ Secured dashboard flow passed!"

      - name: Run API smoke tests
        run: |
          pip install pytest httpx
          pytest tests/ -v --tb=short
        env:
          ENVIRONMENT: development
          AUTH_DB_PATH: ./data/test-auth.db
          REPOSITORY_STORAGE_PATH: ./data/repositories
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: github-actions-secret-key-with-at-least-32-characters
          AUTH_COOKIE_SECURE: "false"

      - name: Show server is alive
        run: |
          echo "============================================"
          echo "✅ Amosclaud AI server ran successfully!"
          echo "   API: http://127.0.0.1:8000"
          echo "============================================"
          curl -s http://127.0.0.1:8000/health | python -m json.tool

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: live-server-log
          path: server.log
          if-no-files-found: warn

      - name: Stop server
        if: always()
        run: |
          kill "$SERVER_PID" || true
