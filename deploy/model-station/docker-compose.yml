services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 20s

  model-bootstrap:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        set -eu;
        model="$${AMOSCLAUD_MODEL_NAME:-qwen2.5-coder:7b}";
        echo "Downloading model: $$model";
        ollama pull "$$model";
        ollama show "$$model" >/dev/null;
        echo "Model checkpoint ready: $$model"
    restart: "no"

  model-station:
    build:
      context: ../..
      dockerfile: deploy/model-station/Dockerfile
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_started
    env_file:
      - .env
    environment:
      AMOSCLAUD_MODEL_BACKEND: ollama
      AMOSCLAUD_MODEL_UPSTREAM_URL: http://ollama:11434
    ports:
      - "8090:8090"
    volumes:
      - folder-model-data:/data/amosclaud-model
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import json, os, urllib.request;
          token=os.getenv('AMOSCLAUD_MODEL_TOKEN','');
          req=urllib.request.Request('http://127.0.0.1:8090/ready', headers={'Authorization': 'Bearer '+token} if token else {});
          data=json.load(urllib.request.urlopen(req, timeout=320));
          raise SystemExit(0 if data.get('ready') is True else 1)
      interval: 30s
      timeout: 330s
      retries: 5
      start_period: 60s

  station-runner:
    build:
      context: ../..
      dockerfile: deploy/model-station/Dockerfile
    restart: unless-stopped
    depends_on:
      model-station:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AMOSCLAUD_MODEL_URL: http://model-station:8090
    command: ["python", "-m", "amoscloud_ai.runner_client"]
    volumes:
      - ../..:/workspace:rw

volumes:
  ollama-data:
  folder-model-data:
