services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"

  model-bootstrap:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["until ollama list >/dev/null 2>&1; do sleep 2; done; ollama pull $${AMOSCLAUD_MODEL_NAME:-qwen2.5-coder:7b}"]
    restart: "no"

  model-station:
    build:
      context: ../..
      dockerfile: deploy/model-station/Dockerfile
    restart: unless-stopped
    depends_on:
      model-bootstrap:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AMOSCLAUD_MODEL_BACKEND: ollama
      AMOSCLAUD_MODEL_UPSTREAM_URL: http://ollama:11434
    ports:
      - "8090:8090"

  station-runner:
    build:
      context: ../..
      dockerfile: deploy/model-station/Dockerfile
    restart: unless-stopped
    depends_on:
      - model-station
    env_file:
      - .env
    environment:
      AMOSCLAUD_MODEL_URL: http://model-station:8090
    command: ["python", "-m", "amoscloud_ai.runner_client"]
    volumes:
      - ../..:/workspace:rw

volumes:
  ollama-data:
