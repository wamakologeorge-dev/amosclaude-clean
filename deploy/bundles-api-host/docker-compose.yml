services:
  bundles-api-host:
    build:
      context: ../..
      dockerfile: deploy/bundles-api-host/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - bundles-data:/data/bundles
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import os,urllib.request;
          urllib.request.urlopen('http://127.0.0.1:' + os.getenv('PORT', '8080') +
          '/api/v1/bundles/health', timeout=5)
      interval: 15s
      timeout: 6s
      retries: 5
      start_period: 10s

volumes:
  bundles-data:
