version: 2.1

jobs:
  verify:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - restore_cache:
          keys:
            - v2-python-{{ checksum "requirements.txt" }}
            - v2-python-
      - run:
          name: Install dependencies
          command: |
            python -m venv .venv
            . .venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install pytest flake8
      - save_cache:
          key: v2-python-{{ checksum "requirements.txt" }}
          paths:
            - .venv
      - run:
          name: Compile Python sources
          command: |
            . .venv/bin/activate
            python -m compileall -q amoscloud_ai src tests
      - run:
          name: Strict syntax and import lint
          command: |
            . .venv/bin/activate
            flake8 amoscloud_ai src tests --count --select=E9,F63,F7,F82 --show-source --statistics
      - run:
          name: Focused platform tests
          command: |
            . .venv/bin/activate
            pytest -q \
              tests/test_server.py \
              tests/test_agent_guidance.py \
              tests/test_autonomous_integrated_intelligence.py \
              tests/test_four_head_surfaces.py

workflows:
  verify-main:
    jobs:
      - verify
