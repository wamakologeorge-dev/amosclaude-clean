services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: amosclaud
      POSTGRES_USER: amosclaud
      POSTGRES_PASSWORD: amosclaud
    volumes:
      - amosclaud-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amosclaud -d amosclaud"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - amosclaud-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  amosclaud-model:
    image: ollama/ollama:latest
    volumes:
      - amosclaud-models:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 20s

  amosclaud-model-init:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://amosclaud-model:11434
      AMOSCLAUD_MODEL: ${AMOSCLAUD_MODEL:-qwen2.5-coder:3b}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until ollama list >/dev/null 2>&1; do sleep 2; done
        ollama pull "$${AMOSCLAUD_MODEL}"
    depends_on:
      amosclaud-model:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://amosclaud:amosclaud@postgres:5432/amosclaud
      REDIS_URL: redis://redis:6379/0
      AUTH_COOKIE_SECURE: "false"
      PORT: "8000"
      AMOSCLAUD_MODEL_URL: http://amosclaud-model:11434
      AMOSCLAUD_MODEL: ${AMOSCLAUD_MODEL:-qwen2.5-coder:3b}
      AMOSCLAUD_ALLOW_EXTERNAL_ADAPTERS: "false"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - amosclaud-data:/app/data
      - amosclaud-repositories:/app/repositories
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      amosclaud-model:
        condition: service_healthy
      amosclaud-model-init:
        condition: service_completed_successfully
    command: uvicorn amoscloud_ai.main:app --host 0.0.0.0 --port 8000 --reload

  workspace:
    image: codercom/code-server:4.96.4
    environment:
      PASSWORD: ${WORKSPACE_PASSWORD:?Set WORKSPACE_PASSWORD in .env}
      DEFAULT_WORKSPACE: /home/coder/project
    ports:
      - "8080:8080"
    volumes:
      - .:/home/coder/project
      - code-server-data:/home/coder/.local/share/code-server
    working_dir: /home/coder/project
    depends_on:
      - app

volumes:
  amosclaud-postgres:
  amosclaud-redis:
  amosclaud-data:
  amosclaud-repositories:
  amosclaud-models:
  code-server-data:
