<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community · Amosclaud</title>
  <link rel="stylesheet" href="/static/community.css" />
</head>
<body>
  <header class="community-topbar">
    <a href="/" class="community-brand">A</a>
    <strong>Amosclaud Community</strong>
    <nav><a href="/repositories">Repositories</a><a href="/">Agent</a></nav>
  </header>

  <main class="community-layout">
    <section class="community-main">
      <article class="community-compose">
        <textarea id="community-post-input" rows="4" maxlength="4000" placeholder="Share what you are building, ask a question, or start an open developer chat…"></textarea>
        <div><span id="community-post-count">0 / 4000</span><button id="community-post-button" type="button">Post to community</button></div>
      </article>

      <div class="community-tabs">
        <button class="active" data-feed="all">Open chat</button>
        <button data-feed="following">Following</button>
      </div>
      <div id="community-feed" class="community-feed">Loading community…</div>
    </section>

    <aside class="community-side">
      <section><h3>Community safety</h3><p>Follow developers you trust. Block users to hide both sides from each other.</p></section>
      <section><h3>Blocked users</h3><div id="blocked-users">None</div></section>
    </aside>
  </main>

  <script src="/static/community.js"></script>
</body>
</html>
