<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repository workspace · Amosclaud</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/workspace.css" />
</head>
<body>
  <header class="ws-topbar">
    <a href="/repositories" class="ws-brand">A</a>
    <div><strong id="ws-repo-name">Repository</strong><span id="ws-repo-meta">Loading…</span></div>
    <select id="ws-branch"></select>
    <button id="ws-new-branch" type="button">New branch</button>
    <a href="/" class="ws-agent-link">Agent</a>
  </header>

  <main class="ws-layout">
    <aside class="ws-files">
      <div class="ws-files-head"><strong>Files</strong><button id="ws-new-file" type="button">＋</button></div>
      <div id="ws-tree" class="ws-tree">Loading files…</div>
    </aside>

    <section class="ws-editor-pane">
      <div class="ws-editor-toolbar">
        <span id="ws-current-file">Select a file</span>
        <div>
          <button id="ws-rename" type="button" disabled>Rename</button>
          <button id="ws-delete" type="button" disabled>Delete</button>
          <button id="ws-save" type="button" disabled>Commit changes</button>
        </div>
      </div>
      <textarea id="ws-editor" spellcheck="false" placeholder="Choose a source file from the left."></textarea>
      <div class="ws-commit-bar">
        <input id="ws-commit-message" type="text" value="Update source file" placeholder="Commit message" />
        <span id="ws-status">Ready</span>
      </div>
    </section>

    <aside class="ws-tools">
      <section><h3>Source tools</h3><button id="ws-build" type="button">Build</button><button id="ws-test" type="button">Run tests</button><button id="ws-review" type="button">Review</button><button id="ws-deploy" type="button">Deploy</button></section>
      <section><h3>Recent commits</h3><div id="ws-commits">Loading…</div></section>
      <section><h3>Output</h3><pre id="ws-output">Select a tool to begin.</pre></section>
    </aside>
  </main>

  <script src="/static/workspace.js"></script>
</body>
</html>
