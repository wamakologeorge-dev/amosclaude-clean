<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Amosclaud AI</title>
  <link rel="stylesheet" href="/static/login.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="brand-panel">
      <div class="brand-mark">A</div>
      <p class="eyebrow">AMOSCLAUD AI</p>
      <h1>Control your automation securely.</h1>
      <p>Sign in to manage pipelines, deployments, and autonomous tasks.</p>
    </section>

    <section class="auth-card" aria-labelledby="auth-title">
      <div class="tabs" role="tablist">
        <button id="login-tab" class="tab active" type="button">Sign in</button>
        <button id="register-tab" class="tab" type="button">Create account</button>
      </div>

      <h2 id="auth-title">Welcome back</h2>
      <p id="auth-subtitle" class="muted">Use your email and password or continue with GitHub.</p>

      <a class="github-button" href="/api/v1/auth/github" aria-label="Continue with GitHub">
        <span>GitHub</span>
        <strong>Continue with GitHub</strong>
      </a>

      <div class="divider"><span>or</span></div>

      <form id="auth-form" autocomplete="on" novalidate>
        <label id="name-field" class="hidden">
          Full name
          <input id="name" name="name" autocomplete="name" minlength="2" />
        </label>
        <label>
          Email address
          <input id="email" name="username" type="email" autocomplete="username" required />
        </label>
        <label>
          Password
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </label>
        <p id="password-hint" class="hint hidden">Use at least 10 characters.</p>
        <button id="submit-button" class="primary-button" type="submit">Sign in</button>
      </form>

      <p id="message" class="message" role="alert" aria-live="polite"></p>
    </section>
  </main>
  <script src="/static/login.js"></script>
</body>
</html>
