<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Projects · Amosclaud</title><link rel="stylesheet" href="/static/style.css"><style>body{margin:0;background:#07111f;color:#eaf2ff;font-family:system-ui}.shell{max-width:1100px;margin:auto;padding:24px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center}.grid{display:grid;grid-template-columns:320px 1fr;gap:18px}.card{background:#0e1c2d;border:1px solid #203752;border-radius:16px;padding:18px;margin:14px 0}input,textarea,select,button{width:100%;box-sizing:border-box;margin:6px 0 12px;padding:11px;border-radius:10px;border:1px solid #33506f;background:#091626;color:#fff}button{background:#1877f2;border:0;font-weight:700;cursor:pointer}.item{padding:12px;border:1px solid #27415e;border-radius:12px;margin:8px 0;cursor:pointer}.muted{color:#9db0c7}.status{font-size:.85rem;padding:3px 8px;border-radius:999px;background:#193451}.row{display:flex;gap:10px}.row>*{flex:1}@media(max-width:780px){.grid{grid-template-columns:1fr}}</style></head><body><main class="shell"><div class="top"><div><h1>Amosclaud Projects</h1><p class="muted">Create real projects, issues, tasks, and verified results.</p></div><a href="/repositories">Repositories</a></div><div class="grid"><aside><section class="card"><h2>New project</h2><form id="project-form"><input id="project-name" placeholder="Project name" required><textarea id="project-description" placeholder="What should Amosclaud build?"></textarea><input id="project-repository" placeholder="owner/repository"><button>Create project</button></form></section><section class="card"><h2>Your projects</h2><div id="projects">Loading…</div></section></aside><section><div id="empty" class="card"><h2>Select a project</h2><p class="muted">Open a project to create issues and view real execution results.</p></div><div id="detail" hidden><section class="card"><h2 id="detail-name"></h2><p id="detail-description" class="muted"></p><p id="detail-repository"></p></section><section class="card"><h2>Create issue</h2><form id="issue-form"><input id="issue-title" placeholder="Issue title" required><textarea id="issue-body" placeholder="Describe the work"></textarea><div class="row"><input id="issue-labels" placeholder="labels, comma separated"><select id="issue-mode"><option value="build">Build</option><option value="fix">Fix</option><option value="test">Test</option><option value="review">Review</option><option value="deploy">Deploy</option></select></div><label><input id="issue-start" type="checkbox" checked style="width:auto"> Start Amosclaud-bot immediately</label><button>Create real issue</button></form></section><section class="card"><h2>Issues</h2><div id="issues"></div></section><section class="card"><h2>Verified results</h2><div id="results"></div></section></div><p id="message" class="muted"></p></section></div></main><script src="/static/projects.js"></script></body></html>
