events {
    worker_connections 1024;
}

http {
    upstream amoscloud_api {
        server amoscloud_api:8000;
        keepalive 32;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    server {
        listen 80;
        server_name _;

        # Redirect HTTP → HTTPS when SSL is available (uncomment in production)
        # return 301 https://$host$request_uri;

        location /health {
            proxy_pass         http://amoscloud_api/health;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            access_log         off;
        }

        location / {
            limit_req          zone=api burst=50 nodelay;

            proxy_pass         http://amoscloud_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;
            proxy_send_timeout    120s;
        }
    }

    # HTTPS server (requires SSL certificates in ./ssl/)
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location / {
    #         proxy_pass http://amoscloud_api;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #         proxy_set_header Connection        "";
    #     }
    # }
}
